name: Feature request
description: Propose a new capability for sync, conflict handling, agent tooling, or Cognee automation.
title: "feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operational or user problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Mention security boundaries, performance constraints, or compatibility requirements. If the request touches LiveSync, CouchDB, or Cognee behavior, note the impact on docs/protocol-overview.md and docs/protocol-compatibility.md.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
